# Runner-owned family config for the canonical batch matrix.
# This schema is provisional in Phase 0 and should not be treated as a public
# cross-family contract yet.

name: main_agentic_matrix
mode: batch

benchmarks:
  - aeossp_standard
  - regional_coverage
  - relay_constellation
  - revisit_constellation
  - satnet
  - spot5
  - stereo_imaging

harnesses:
  - claude_code
  - codex
  - gemini_cli
  - kimi_cli
  - opencode_glm
  - opencode_nex

defaults:
  split: test
  timeout_seconds: 7200

batch:
  max_concurrency: 6
  max_retries: 1
  harness_cooldown_seconds: 0
  skip_completed: true
  retry_statuses:
    - runner_error
    - timeout
    - agent_failed

resources:
  cpus: 8
  memory: 32g
  shm_size: 16g

results:
  root: results/agent_runs/experiments/main_agentic
  aggregate_dir: summaries
