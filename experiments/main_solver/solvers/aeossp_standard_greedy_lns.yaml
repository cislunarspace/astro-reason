id: aeossp_standard_greedy_lns
benchmark: aeossp_standard
solver: greedy_lns
solver_path: solvers/aeossp_standard/greedy_lns
evidence_type: reproduced_solver
runnable: true
setup_script: setup.sh
solve_script: solve.sh
solution_filename: solution.json
aggregate_metrics:
  - name: CR
    source: verifier.metrics.CR
  - name: WCR
    source: verifier.metrics.WCR
  - name: TAT
    source: verifier.metrics.TAT
  - name: PC
    source: verifier.metrics.PC
config:
  total_time_budget_s: 300
  candidate_workers: 4
  restart_count: 8
  local_search_workers: 4
  random_seed: 106
  stochastic_ordering: true
  enable_exact_reinsertion: true
  max_exact_component_size: 10
  exact_subproblem_timeout_s: 0.05
  enable_battery_guardrails: true
  battery_guard_min_wh: 0.0
  max_repair_iterations: 300
cases:
  - id: test/case_0001
    case_dir: benchmarks/aeossp_standard/dataset/cases/test/case_0001
  - id: test/case_0002
    case_dir: benchmarks/aeossp_standard/dataset/cases/test/case_0002
  - id: test/case_0003
    case_dir: benchmarks/aeossp_standard/dataset/cases/test/case_0003
  - id: test/case_0004
    case_dir: benchmarks/aeossp_standard/dataset/cases/test/case_0004
  - id: test/case_0005
    case_dir: benchmarks/aeossp_standard/dataset/cases/test/case_0005
verifier:
  command:
    - uv
    - run
    - python
    - -m
    - benchmarks.aeossp_standard.verifier.run
    - "{case_dir}"
    - "{solution_path}"
