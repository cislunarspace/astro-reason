name: difficulty_ablation
mode: batch

benchmark: aeossp_standard
splits:
  - test_easy
  - test
  - test_hard
cases:
  - case_0001
  - case_0002
  - case_0003
  - case_0004
  - case_0005
harnesses:
  - codex
  - opencode_dpsk

timeout_seconds: 7200

batch:
  max_concurrency: 2
  max_retries: 1
  skip_completed: true
  retry_statuses:
    - runner_error
    - timeout
    - agent_failed

resources:
  cpus: 8
  memory: 32g
  shm_size: 16g

results:
  root: results/agent_runs/experiments/difficulty_ablation
  aggregate_dir: summaries
