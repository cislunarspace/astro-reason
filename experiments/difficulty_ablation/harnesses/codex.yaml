harness: codex
runtime: base

assemble:
  - source: experiments/_fragments/configs/codex/.codex
    target: /home/korolev/.codex
    example: experiments/_fragments/configs/codex/.codex.example
  - source: .agents/skills/brahe
    target: /home/korolev/.codex/skills/brahe

commands:
  headless_shell_command: >-
    codex exec --dangerously-bypass-approvals-and-sandbox
    --skip-git-repo-check
    --cd /app/workspace
    "$(cat ~/PROMPT.md)"

collect:
  - source: /home/korolev/.codex/sessions
    target: results_root/session_logs/sessions
  - source: /home/korolev/.codex/session_index.jsonl
    target: results_root/session_logs/session_index.jsonl
  - source: /home/korolev/.codex/history.jsonl
    target: results_root/session_logs/history.jsonl
  - source: /home/korolev/.codex/log
    target: results_root/session_logs/log

forward_env_keys:
  - AR_OPENAI_API_KEY
