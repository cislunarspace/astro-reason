active_profile: public
compute_envelope:
  name: public
  deterministic: true
  expected_case_wall_time_seconds: 360
  worker_count_policy: fixed_8_workers

rgt_search:
  max_repeat_days: 2
  min_revolutions_per_day: 11
  max_revolutions_per_day: 17
  inclinations_deg: [30.0, 40.0, 45.0, 53.0, 58.0, 63.4, 70.0, 75.0, 82.0, 97.8]
  max_templates: 24
  closure_tolerance_m: 5000.0
  refinement_iterations: 10

coverage:
  raan_count: 48
  raan_start_deg: 0.0
  sample_step_sec: 240.0
  keep_samples_per_window: 4
  worker_count: 8

scheduling:
  observation_duration_sec: 30.0
  opportunity_sample_step_sec: 60.0
  min_gap_improvement_sec: 60.0
  validation_sample_step_sec: 10.0
  refinement_propagation: numerical_j2
  elevation_safety_margin_deg: 0.0
  range_safety_margin_m: 15000.0
  off_nadir_safety_margin_deg: 0.5
  max_actions: 3000
  max_selection_repair_rounds: 8
  max_repair_alternates_per_target: 8
  numerical_repair_candidate_limit: 64
  opportunity_worker_count: 8
  repair_worker_count: 8
